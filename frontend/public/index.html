<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Remittance Pro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f0f4ff;font-family:-apple-system,sans-serif;padding:16px;min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-top:24px}
h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center}
p.sub{text-align:center;color:#94a3b8;font-size:14px;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:16px}
label{display:block;font-size:11px;font-weight:600;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#f0f4ff;font-size:15px;padding:12px;outline:none;-webkit-appearance:none;margin-bottom:6px}
input:focus{border-color:#3b82f6}
.chains{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.chain{padding:10px 6px;background:#283548;border:2px solid #334155;border-radius:10px;cursor:pointer;text-align:center;transition:all .15s}
.chain.active{border-color:#3b82f6;background:rgba(59,130,246,.08)}
.chain .icon{font-size:18px;margin-bottom:2px}
.chain .name{font-size:11px;font-weight:600}
.chain .sym{font-size:10px;color:#94a3b8}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#14b8a6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{width:100%;padding:10px;border:1px solid #334155;border-radius:10px;background:#283548;color:#f0f4ff;font-size:13px;cursor:pointer;margin-bottom:8px}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px;color:#fca5a5;font-size:13px;margin-bottom:12px;white-space:pre-wrap}
.success-icon{text-align:center;font-size:48px;margin-bottom:12px}
.claim-box{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:#3b82f6;word-break:break-all;margin:12px 0}
.hidden{display:none}
.wallet-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.wallet-info{font-size:12px;color:#94a3b8}
.wallet-addr{font-family:monospace;font-size:11px;color:#f0f4ff}
.btn-wallet{padding:8px 14px;border:1px solid #3b82f6;background:rgba(59,130,246,.1);color:#3b82f6;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
.btn-wallet.ok{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.1)}
/* Amount toggle */
.amount-row{display:flex;gap:6px;margin-bottom:6px}
.amount-row input{flex:1;margin-bottom:0}
.mode-btn{padding:0 14px;background:#283548;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;min-width:52px}
.mode-btn.usd{border-color:#10b981;color:#10b981;background:rgba(16,185,129,.08)}
.price-hint{font-size:11px;color:#64748b;margin-bottom:12px;min-height:16px}
</style>
</head>
<body>
<div class="app">
  <h1>Email Remittance</h1>
  <p class="sub">Send crypto to anyone — no wallet needed to receive</p>

  <div id="view-form">
    <div class="card">
      <div class="wallet-bar">
        <div class="wallet-info">
          <div id="w-label">Not connected</div>
          <div class="wallet-addr" id="w-addr"></div>
        </div>
        <div style="text-align:right">
          <button class="btn-wallet" id="btn-w" onclick="connectWallet()">Connect Wallet</button>
          <div id="w-balance" style="font-size:11px;color:#64748b;margin-top:4px;text-align:right"></div>
        </div>
      </div>

      <label>Chain</label>
      <div class="chains">
        <div class="chain active" id="c-celo" onclick="setChain('celo','CELO')"><div class="icon">🟡</div><div class="name">Celo</div><div class="sym">CELO</div></div>
        <div class="chain" id="c-base" onclick="setChain('base','ETH')"><div class="icon">🔵</div><div class="name">Base</div><div class="sym">ETH</div></div>
        <div class="chain" id="c-monad" onclick="setChain('monad','MON')"><div class="icon">🟣</div><div class="name">Monad</div><div class="sym">MON</div></div>
      </div>

      <label>Your Email</label>
      <input type="email" id="sender-email" placeholder="you@example.com"/>

      <label>Recipient Email</label>
      <input type="email" id="email" placeholder="recipient@gmail.com"/>

      <label>Amount — <span id="mode-label">enter in <span id="sym">CELO</span></span></label>
      <div class="amount-row">
        <input type="number" id="amount" placeholder="0.01" min="0" step="any" oninput="onAmountInput()"/>
        <button class="mode-btn" id="mode-btn" onclick="toggleMode()">$ USD</button>
      </div>
      <div class="price-hint" id="price-hint"></div>

      <button class="btn" id="btn-send" onclick="send()" disabled>Connect wallet to send</button>
    </div>
  </div>

  <div id="view-success" style="display:none">
    <div class="card">
      <div class="success-icon">✅</div>
      <h2 style="text-align:center;margin-bottom:8px">Sent!</h2>
      <p style="text-align:center;color:#94a3b8;font-size:13px;margin-bottom:16px" id="s-sub"></p>
      <div style="font-size:12px;color:#94a3b8;margin-bottom:4px">Claim link:</div>
      <div class="claim-box" id="claim-url"></div>
      <button class="btn-sec" onclick="navigator.clipboard.writeText(document.getElementById('claim-url').textContent).then(()=>{this.textContent='✅ Copied!';setTimeout(()=>this.textContent='📋 Copy claim link',2000)})">📋 Copy claim link</button>
      <button class="btn-sec" onclick="reset()">Send another →</button>
    </div>
  </div>

  <div id="view-error" style="display:none">
    <div class="card">
      <div class="error" id="err-msg"></div>
      <button class="btn-sec" onclick="showForm()">Try again</button>
    </div>
  </div>

  <div id="view-loading" style="display:none">
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:32px;margin-bottom:12px">⏳</div>
      <p style="color:#94a3b8">Processing on <span id="chain-name">Celo</span>…</p>
    </div>
  </div>
</div>

<!-- process polyfill required by WalletConnect UMD build -->
<script>window.process = { env: {}, browser: true, version: '', versions: {} };</script>
<!-- WalletConnect QR Modal + Ethereum Provider (proven UMD builds) -->
<script src="https://unpkg.com/@walletconnect/modal@2.7.0/dist/index.umd.js"></script>
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.17.0/dist/index.umd.js"></script>
<script>
let _wcProvider = null;

async function getWCProvider() {
  if (_wcProvider) return _wcProvider;
  const EthereumProvider = window["@walletconnect/ethereum-provider"]?.EthereumProvider;
  if (!EthereumProvider) throw new Error('WalletConnect not loaded');
  _wcProvider = await EthereumProvider.init({
    projectId: '517a14b6d4785b327159fecafa4dd240',
    chains: [42220],
    optionalChains: [8453, 10143],
    showQrModal: true,
    qrModalOptions: { themeMode: 'dark' }
  });
  _wcProvider.on('accountsChanged', accs => {
    if (accs.length) window.onWalletConnected(accs[0]);
    else window.onWalletDisconnected();
  });
  _wcProvider.on('disconnect', () => window.onWalletDisconnected());
  return _wcProvider;
}

window.openWalletModal = async function() {
  try {
    const wc = await getWCProvider();
    await wc.connect();
    const accs = await wc.request({ method: 'eth_accounts' });
    if (accs[0]) window.onWalletConnected(accs[0]);
  } catch(e) {
    if (!e.message?.includes('User closed')) console.error('WC connect error:', e);
  }
};

window.wagmiSign = async function(message) {
  // WalletConnect session active
  if (_wcProvider && _wcProvider.connected) {
    const accs = await _wcProvider.request({ method: 'eth_accounts' });
    return _wcProvider.request({ method: 'personal_sign', params: [message, accs[0]] });
  }
  // Injected wallet (MetaMask, Brave, Coinbase extension)
  const p = getProvider();
  if (p) {
    const accs = await p.request({ method: 'eth_accounts' });
    return p.request({ method: 'personal_sign', params: [message, accs[0]] });
  }
  throw new Error('No wallet connected');
};
</script>

<script>
const API = 'https://email-remittance-pro.up.railway.app';
const COINGECKO_IDS = { celo:'celo', base:'ethereum', monad:'monad-network' };
let chain='celo', chainSym='CELO', walletAddr=null, walletProof=null;
let usdMode=false, tokenPrice=null, priceTimer=null;

// ── Price fetch ─────────────────────────────────────────────
async function fetchPrice(){
  try{
    const id = COINGECKO_IDS[chain] || 'celo';
    const r = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${id}&vs_currencies=usd`);
    const d = await r.json();
    tokenPrice = d[id]?.usd || null;
    updateHint();
  }catch(e){ tokenPrice=null; }
}

function updateHint(){
  const hint = document.getElementById('price-hint');
  const val  = parseFloat(document.getElementById('amount').value)||0;
  if(!val){ hint.textContent=''; return; }
  if(usdMode && tokenPrice){
    const tokens = (val/tokenPrice).toFixed(6);
    hint.textContent = `≈ ${tokens} ${chainSym} will be sent`;
  } else if(!usdMode && tokenPrice){
    const usd = (val*tokenPrice).toFixed(2);
    hint.textContent = `≈ $${usd} USD`;
  } else {
    hint.textContent = '';
  }
}

function onAmountInput(){ updateHint(); }

function toggleMode(){
  usdMode = !usdMode;
  const btn = document.getElementById('mode-btn');
  const lbl = document.getElementById('mode-label');
  const inp = document.getElementById('amount');
  if(usdMode){
    btn.textContent = chainSym;
    btn.classList.add('usd');
    lbl.innerHTML = `enter in <strong>USD $</strong>`;
    inp.placeholder = '10.00';
    inp.step = '0.01';
  } else {
    btn.textContent = '$ USD';
    btn.classList.remove('usd');
    lbl.innerHTML = `enter in <span id="sym">${chainSym}</span>`;
    inp.placeholder = '0.01';
    inp.step = 'any';
  }
  document.getElementById('amount').value='';
  document.getElementById('price-hint').textContent='';
  updateHint();
}

function setChain(c,s){
  chain=c; chainSym=s;
  document.getElementById('sym') && (document.getElementById('sym').textContent=s);
  document.getElementById('chain-name').textContent=c.charAt(0).toUpperCase()+c.slice(1);
  ['celo','base','monad'].forEach(x=>document.getElementById('c-'+x).classList.toggle('active',x===c));
  // Update mode button label
  if(!usdMode) document.getElementById('mode-btn').textContent='$ USD';
  else document.getElementById('mode-btn').textContent=s;
  tokenPrice=null;
  fetchPrice();
  updateHint();
  // Refresh balance for new chain
  if(walletAddr) fetchBalance(walletAddr, c);
}

// ── Wallet detection ────────────────────────────────────────
function getProvider(){
  // MetaMask, Brave, Coinbase, Trust, any EIP-1193 provider
  if(window.ethereum) return window.ethereum;
  // MetaMask mobile injects under ethereum
  if(window.web3?.currentProvider) return window.web3.currentProvider;
  // Multi-provider (EIP-6963)
  if(window.ethereum?.providers?.length) return window.ethereum.providers[0];
  return null;
}

// ── Balance fetch ────────────────────────────────────────────
const CHAIN_RPC = {
  celo: 'https://forno.celo.org',
  base: 'https://mainnet.base.org',
  monad: 'https://testnet-rpc.monad.xyz'
};

async function fetchBalance(address, chainKey) {
  try {
    const rpc = CHAIN_RPC[chainKey] || CHAIN_RPC.celo;
    const res = await fetch(rpc, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({jsonrpc:'2.0',method:'eth_getBalance',params:[address,'latest'],id:1})
    });
    const data = await res.json();
    const wei = parseInt(data.result, 16);
    const bal = (wei / 1e18).toFixed(4);
    document.getElementById('w-balance').textContent = `${bal} ${chainSym}`;
  } catch(e) {
    document.getElementById('w-balance').textContent = '';
  }
}

// ── Wallet callbacks from Web3Modal ─────────────────────────
window.onWalletConnected = async function(address) {
  walletAddr = address;
  const btn = document.getElementById('btn-w');

  // Update UI immediately
  document.getElementById('w-addr').textContent = address.slice(0,6)+'…'+address.slice(-4);
  document.getElementById('w-label').textContent = '⚠️ Pending verification';
  btn.textContent = 'Sign to verify'; btn.disabled = false;
  btn.onclick = signToVerify;

  // Fetch balance for current chain
  fetchBalance(address, chain);
};

async function signToVerify() {
  if(!walletAddr) return;
  const btn = document.getElementById('btn-w');
  btn.textContent = 'Check wallet…'; btn.disabled = true;
  try {
    const nonce = Date.now()+'';
    const msg = `Email Remittance Pro\nProve wallet ownership\n${walletAddr}\nNonce:${nonce}\n\nNo funds moved.`;

    let sig;
    // Use wagmi signer (works for WalletConnect, injected, all wallet types)
    if(window.wagmiSign) {
      sig = await window.wagmiSign(msg);
    } else {
      // Fallback to raw provider if wagmi not loaded yet
      const p = getProvider();
      if(!p) throw new Error('Wallet not ready — try again in a moment');
      sig = await p.request({method:'personal_sign', params:[msg, walletAddr]});
    }

    walletProof = {message:msg, signature:sig, nonce, address:walletAddr};
    document.getElementById('w-label').textContent = '✓ Verified';
    btn.textContent = walletAddr.slice(0,6)+'…'+walletAddr.slice(-4);
    btn.classList.add('ok'); btn.disabled = false;
    btn.onclick = connectWallet;
    document.getElementById('btn-send').disabled = false;
    document.getElementById('btn-send').textContent = 'Send →';
  } catch(e) {
    btn.textContent = 'Sign to verify'; btn.disabled = false;
    const msg = e.message || '';
    if(!msg.includes('User rejected') && !msg.includes('user rejected') && e.code !== 4001) {
      document.getElementById('w-label').textContent = '⚠️ Sign failed — try again';
    }
  }
}

window.onWalletDisconnected = function() {
  walletAddr = null; walletProof = null;
  const btn = document.getElementById('btn-w');
  btn.textContent = 'Connect Wallet'; btn.classList.remove('ok'); btn.disabled = false;
  btn.onclick = connectWallet;
  document.getElementById('w-label').textContent = 'Not connected';
  document.getElementById('w-addr').textContent = '';
  document.getElementById('w-balance').textContent = '';
  document.getElementById('btn-send').disabled = true;
  document.getElementById('btn-send').textContent = 'Connect wallet to send';
};

window.onWalletDisconnected = function() {
  walletAddr = null; walletProof = null;
  const btn = document.getElementById('btn-w');
  btn.textContent = 'Connect Wallet'; btn.classList.remove('ok'); btn.disabled = false;
  document.getElementById('w-label').textContent = 'Not connected';
  document.getElementById('w-addr').textContent = '';
  document.getElementById('btn-send').disabled = true;
  document.getElementById('btn-send').textContent = 'Connect wallet to send';
};

// ── Wallet ──────────────────────────────────────────────────
async function connectWallet(){
  // Try injected wallet first (MetaMask, Brave, Coinbase extension)
  let p = getProvider();
  if(!p){ await new Promise(r=>setTimeout(r,500)); p = getProvider(); }

  if(p){
    // Extension wallet available — use it directly
    const btn=document.getElementById('btn-w');
    btn.textContent='Connecting…'; btn.disabled=true;
    try{
      const accs=await p.request({method:'eth_requestAccounts'});
      await window.onWalletConnected(accs[0], null);
      return;
    } catch(e) {
      btn.textContent='Connect Wallet'; btn.disabled=false;
      if(e.code===4001) return; // user explicitly rejected — stop here
      // Any other error (extension not found, locked, wrong network) → fall through to WalletConnect modal
    }
  }

  // No extension OR extension failed — open WalletConnect QR modal
  if(window.openWalletModal) {
    window.openWalletModal();
  } else {
    showError('Wallet modal loading… try again in a moment.');
  }
}

// ── Send ────────────────────────────────────────────────────
async function send(){
  const senderEmail=document.getElementById('sender-email').value.trim();
  const email=document.getElementById('email').value.trim();
  const raw=parseFloat(document.getElementById('amount').value)||0;
  if(!senderEmail||!/\S+@\S+\.\S+/.test(senderEmail)){alert('Enter your email address');return;}
  if(!email||!/\S+@\S+\.\S+/.test(email)){alert('Enter a valid recipient email');return;}
  if(!raw||raw<=0){alert('Enter a valid amount');return;}

  // Convert USD → token if in USD mode
  let tokenAmount = raw;
  if(usdMode){
    if(!tokenPrice){ alert('Price not loaded yet — try again in a moment.'); return; }
    tokenAmount = raw / tokenPrice;
  }
  const amountStr = tokenAmount.toFixed(8);

  show('loading');
  try{
    const r=await fetch(API+'/api/remittance/send',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        senderEmail:senderEmail,
        recipientEmail:email, amount:amountStr, chain,
        requireAuth:false, feeModel:'standard',
        senderWallet:walletAddr||'', walletProof
      })
    });
    const d=await r.json();
    if(!r.ok||!d.success) throw new Error(d?.error?.message||d?.message||'Send failed');
    document.getElementById('claim-url').textContent=d.data.claimUrl;
    const usdNote = usdMode && tokenPrice ? ` ($${raw.toFixed(2)} USD)` : '';
    document.getElementById('s-sub').textContent=`${amountStr} ${chainSym}${usdNote} sent to ${email}`;
    show('success');
  }catch(e){ showError(e.message); }
}

function show(v){
  document.getElementById('view-form').style.display    = (v==='form')    ? 'block' : 'none';
  document.getElementById('view-success').style.display = (v==='success') ? 'block' : 'none';
  document.getElementById('view-error').style.display   = (v==='error')   ? 'block' : 'none';
  document.getElementById('view-loading').style.display = (v==='loading') ? 'block' : 'none';
}
function showForm(){show('form');}
function showError(m){document.getElementById('err-msg').textContent=m;show('error');}
function reset(){document.getElementById('email').value='';document.getElementById('amount').value='';show('form');}

// Init
show('form');
fetchPrice();
setInterval(fetchPrice, 30000);

</script>
</body>
</html>
